name: Deploy Proxy to Render

on:
  push:
    branches: [main]
    paths:
      - 'proxy-mtls/**'
      - '.github/workflows/deploy-proxy-render.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Render
        env:
          RENDER_API_KEY: nfse-proxy-9xK2mP7q
          RENDER_SERVICE_ID: srv-d7nupjapmmbs73cq86c0
        run: |
          if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_SERVICE_ID" ]; then
            echo "⚠️  RENDER_API_KEY ou RENDER_SERVICE_ID não configurados"
            echo "    Configure os secrets no GitHub para deploy automático"
            exit 1
          fi

          echo "🚀 Acionando deploy no Render..."
          curl -s -X POST \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{}' \
            | tee render-response.json

          echo ""
          echo "✅ Deploy solicitado com sucesso"
