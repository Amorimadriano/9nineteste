name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy-supabase.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRvbXJsb3BzbXhndnpncXNmaXpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTcwNzQsImV4cCI6MjA5MDQzMzA3NH0.l2r0zBo8p4Y2xkXSQYO5exQCvqtq0yYF4-J6sLz7RhQ
        run: |
          supabase link --project-ref rjcruiwlurqdwooarrpa
          supabase functions deploy --use-api
