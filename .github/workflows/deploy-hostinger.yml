name: Deploy to Hostinger

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'vite.config.ts'
      - 'package.json'
      - 'tsconfig.json'
      - 'tailwind.config.ts'
      - '.github/workflows/deploy-hostinger.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build production
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: bun run build

      - name: Check DNS resolution
        run: |
          echo "Resolving FTP server..."
          nslookup ${{ secrets.HOSTINGER_FTP_SERVER }} || true
          echo "Checking connectivity..."
          curl -v --connect-timeout 10 ftp://${{ secrets.HOSTINGER_FTP_SERVER }}:21/ 2>&1 | head -20 || true
        shell: bash

      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.9nineteste.9ninebusinesscontrol.com.br
          username: u358595036.amorimadriano83
          password: Enzo@159753
          protocol: ftps
          port: 21
          security: loose
          timeout: 300000
          local-dir: ./dist/
          server-dir: /home/u358595036/domains/9nineteste.9ninebusinesscontrol.com.br/public_html/
          dangerous-clean-slate: true
          state-name: .ftp-deploy-sync-state-new
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.env*
